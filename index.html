<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HHT – Happy House Token</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon-cyan: #00f5ff;
      --neon-purple: #bf00ff;
      --neon-gold: #ffd700;
      --neon-pink: #ff2d78;
      --neon-green: #00ff88;
      --dark: #03050f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--dark);
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
      cursor: default;
    }

    /* ── HERO ── */
    #hero {
      position: relative;
      width: 100%;
      /* Use padding-top based on image aspect ratio to maintain proportions */
      /* Image is landscape, we want it to fill nicely */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('2428.png');
      background-size: cover;
      background-position: center 20%;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* dark overlay */
    #hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(3,5,15,0.4) 0%,
        rgba(3,5,15,0.1) 35%,
        rgba(3,5,15,0.5) 100%
      );
    }

    /* ── LOGO ── */
    #logo {
      position: relative;
      z-index: 10;
      text-align: center;
      padding-top: clamp(18px, 4vw, 40px);
      animation: fadeDown 0.9s ease both;
    }

    #logo h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.4rem, 7vw, 5.5rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      color: #fff;
      text-shadow:
        0 0 8px var(--neon-cyan),
        0 0 24px var(--neon-cyan),
        0 0 60px rgba(0,245,255,0.4);
    }

    #logo p {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(0.65rem, 1.8vw, 1rem);
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.65);
      margin-top: 4px;
      text-transform: uppercase;
    }

    /* ── SOCIAL ICONS ── */
    #socials {
      position: relative;
      z-index: 10;
      display: flex;
      gap: 16px;
      margin-top: 14px;
      animation: fadeDown 1s 0.2s ease both;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 18px;
      border-radius: 40px;
      border: 1px solid rgba(0,245,255,0.35);
      background: rgba(0,0,0,0.45);
      color: var(--neon-cyan);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-decoration: none;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .social-btn:hover {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 14px rgba(0,245,255,0.45);
      background: rgba(0,245,255,0.08);
    }
    .social-btn svg { width: 16px; height: 16px; fill: currentColor; }

    /* ── BUILDING HOTSPOTS — absolute positioned over image ── */
    #buildings {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .building-link {
      position: absolute;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-decoration: none;
      pointer-events: all;
      transition: filter 0.2s;
      cursor: pointer;
    }
    .building-link:hover { filter: brightness(1.2); }

    /* Exact % positions from measured data */
    .b-arena   { left: 2.9%;  top: 18.1%; width: 20.3%; height: 54.3%; }
    .b-crypto  { left: 30.3%; top: 21.6%; width: 10.3%; height: 49.6%; }
    .b-library { left: 46.6%; top: 30.4%; width: 10.6%; height: 41.4%; }
    .b-kitchen { left: 63.5%; top: 37.5%; width: 7.1%;  height: 34.6%; }
    .b-living  { left: 74.2%; top: 46.6%; width: 9.9%;  height: 29.1%; }
    .b-garage  { left: 86.5%; top: 35.8%; width: 9.8%;  height: 39.5%; }

    .building-label {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.4rem, 1.1vw, 0.8rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 1.2;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      transition: box-shadow 0.2s, border-color 0.2s;
      white-space: nowrap;
      margin-top: 6px;
    }

    .b-arena   .building-label { color: #c77dff; border-color: rgba(199,125,255,0.4); }
    .b-arena:hover   .building-label { box-shadow: 0 0 16px rgba(199,125,255,0.6); border-color: #c77dff; }

    .b-crypto  .building-label { color: var(--neon-cyan); border-color: rgba(0,245,255,0.35); }
    .b-crypto:hover  .building-label { box-shadow: 0 0 16px rgba(0,245,255,0.55); border-color: var(--neon-cyan); }

    .b-library .building-label { color: #74b3f7; border-color: rgba(116,179,247,0.35); }
    .b-library:hover .building-label { box-shadow: 0 0 16px rgba(116,179,247,0.55); border-color: #74b3f7; }

    .b-kitchen .building-label { color: var(--neon-gold); border-color: rgba(255,215,0,0.35); }
    .b-kitchen:hover .building-label { box-shadow: 0 0 16px rgba(255,215,0,0.55); border-color: var(--neon-gold); }

    .b-living  .building-label { color: var(--neon-pink); border-color: rgba(255,45,120,0.35); }
    .b-living:hover  .building-label { box-shadow: 0 0 16px rgba(255,45,120,0.55); border-color: var(--neon-pink); }

    .b-garage  .building-label { color: var(--neon-gold); border-color: rgba(255,215,0,0.35); }
    .b-garage:hover  .building-label { box-shadow: 0 0 16px rgba(255,215,0,0.55); border-color: var(--neon-gold); }

    /* ── AD BANNER — above Garage, right side ── */
    #ad-wrapper {
      position: absolute;
      right: clamp(6px, 2vw, 32px);
      top: clamp(60px, 10vw, 120px);
      z-index: 20;
      max-width: min(320px, 42vw);
      width: 100%;
    }

    #ad-wrapper iframe {
      border: 0;
      padding: 0;
      width: 100% !important;
      height: auto;
      overflow: hidden;
      display: block;
      margin: auto;
    }

    /* ── ROADMAP STRIP ── */
    #roadmap-strip {
      position: relative;
      z-index: 10;
      width: 100%;
      background: rgba(3,5,15,0.82);
      border-top: 1px solid rgba(0,245,255,0.2);
      padding: clamp(18px, 3vw, 32px) 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #roadmap-strip a {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.1rem, 3vw, 1.9rem);
      font-weight: 900;
      letter-spacing: 0.18em;
      color: #fff;
      text-decoration: none;
      text-shadow: 0 0 12px rgba(255,255,255,0.3);
      transition: text-shadow 0.2s, color 0.2s;
    }
    #roadmap-strip a:hover {
      color: var(--neon-cyan);
      text-shadow: 0 0 24px var(--neon-cyan);
    }

    .roadmap-dots {
      display: flex;
      gap: clamp(18px, 5vw, 60px);
      align-items: center;
    }
    .dot {
      width: clamp(10px,1.8vw,16px);
      height: clamp(10px,1.8vw,16px);
      border-radius: 50%;
      border: 2px solid;
      position: relative;
    }
    .dot::before {
      content:'';
      position:absolute;
      top:50%; left:100%;
      height:2px;
      width: clamp(16px, 4.5vw, 58px);
      transform: translateY(-50%);
    }
    .dot:last-child::before { display:none; }
    .dot.cyan  { border-color: var(--neon-cyan);  box-shadow: 0 0 8px var(--neon-cyan); }
    .dot.cyan::before  { background: var(--neon-cyan); }
    .dot.teal  { border-color: #00ffcc;            box-shadow: 0 0 8px #00ffcc; }
    .dot.teal::before  { background: #00ffcc; }
    .dot.amber { border-color: var(--neon-gold);   box-shadow: 0 0 8px var(--neon-gold); }
    .dot.amber::before { background: var(--neon-gold); }
    .dot.red   { border-color: var(--neon-pink);   box-shadow: 0 0 8px var(--neon-pink); }
    .dot.red::before   { background: var(--neon-pink); }
    .dot.green { border-color: var(--neon-green);  box-shadow: 0 0 8px var(--neon-green); }
    .dot.green::before { background: var(--neon-green); }

    /* ── FOOTER ── */
    footer {
      background: rgba(3,5,15,0.95);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    footer span {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.05em;
    }
    footer a {
      display: flex; align-items: center; gap: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }
    footer a:hover { color: var(--neon-cyan); }
    footer a svg { width:15px; height:15px; fill:currentColor; }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity:0; transform: translateY(-18px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── MOBILE ── */
    @media (max-width: 700px) {
      #hero-bg {
        background-position: center 20%;
      }

      /* on mobile scale labels down more */
      .building-label {
        font-size: clamp(0.32rem, 2.2vw, 0.6rem);
        padding: 3px 5px;
      }

      /* banner goes below hero on mobile */
      #ad-wrapper {
        position: relative;
        right: auto; top: auto;
        max-width: 94%;
        margin: 12px auto 0;
        z-index: 10;
      }

      .roadmap-dots { gap: 8px; }
    }

    @media (max-width: 420px) {
      #logo h1 { font-size: 2rem; }
      #logo p  { font-size: 0.55rem; }
    }
  </style>
</head>
