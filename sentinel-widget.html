<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HHT Assistant</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rajdhani:wght@400;500;600;700&display=swap');

:root {
  --cyan: #00f0ff;
  --pink: #ff1aaa;
  --gold: #ffe900;
  --orange: #ff8c00;
  --bg: #06080f;
  --card: #0d1120;
  --border: rgba(0,240,255,0.2);
  --text: #c8d8f0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

#hht-chat-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: #000;
  border: 2px solid var(--orange);
  box-shadow: 0 0 20px rgba(255,140,0,0.5), 0 0 60px rgba(255,140,0,0.15);
  cursor: pointer;
  z-index: 9998;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  animation: pulse-btn 3s ease-in-out infinite;
  padding: 0;
  overflow: hidden;
}

#hht-chat-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px rgba(255,140,0,0.7), 0 0 80px rgba(255,140,0,0.25);
}

#hht-chat-btn img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

#hht-close-icon {
  display: none;
  position: absolute;
  width: 100%;
  height: 100%;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.75);
  border-radius: 50%;
  color: var(--pink);
  font-size: 22px;
  font-weight: bold;
  font-family: sans-serif;
}

#hht-chat-btn.open #hht-close-icon { display: flex; }

@keyframes pulse-btn {
  0%, 100% { box-shadow: 0 0 20px rgba(255,140,0,0.5), 0 0 60px rgba(255,140,0,0.15); }
  50% { box-shadow: 0 0 35px rgba(255,140,0,0.8), 0 0 90px rgba(255,140,0,0.25); }
}

#hht-chat-window {
  position: fixed;
  bottom: 100px;
  right: 24px;
  width: 360px;
  height: 520px;
  background: var(--bg);
  border: 1px solid rgba(255,140,0,0.25);
  border-radius: 16px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(255,140,0,0.1), 0 20px 60px rgba(0,0,0,0.8);
  transform: translateY(20px) scale(0.95);
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

#hht-chat-window.visible {
  transform: translateY(0) scale(1);
  opacity: 1;
  pointer-events: all;
}

#hht-chat-window::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(255,140,0,0.012) 2px, rgba(255,140,0,0.012) 4px
  );
  pointer-events: none;
  z-index: 1;
  border-radius: 16px;
}

#hht-header {
  background: linear-gradient(135deg, #0a0800, #110f04);
  border-bottom: 1px solid rgba(255,140,0,0.2);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
  z-index: 2;
}

.hht-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid var(--orange);
  box-shadow: 0 0 14px rgba(255,140,0,0.6);
  overflow: hidden;
  flex-shrink: 0;
  animation: sentinel-glow 3s ease-in-out infinite;
}

.hht-avatar img { width: 100%; height: 100%; object-fit: cover; }

@keyframes sentinel-glow {
  0%, 100% { box-shadow: 0 0 14px rgba(255,140,0,0.6); border-color: #ff8c00; }
  50% { box-shadow: 0 0 26px rgba(255,165,0,0.9); border-color: #ffaa00; }
}

.hht-header-name {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: var(--orange);
  letter-spacing: 1px;
  text-shadow: 0 0 8px rgba(255,140,0,0.6);
}

.hht-header-sub {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px;
  color: rgba(200,216,240,0.35);
  margin-top: 2px;
}

.hht-header-status {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  color: rgba(200,216,240,0.45);
  margin-top: 3px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #00ff88;
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

#hht-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
  z-index: 2;
}

#hht-messages::-webkit-scrollbar { width: 4px; }
#hht-messages::-webkit-scrollbar-track { background: transparent; }
#hht-messages::-webkit-scrollbar-thumb { background: rgba(255,140,0,0.2); border-radius: 2px; }

.hht-msg { max-width: 85%; animation: msg-in 0.3s ease; }

@keyframes msg-in {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.hht-msg.bot { align-self: flex-start; }
.hht-msg.user { align-self: flex-end; }

.hht-msg-bubble {
  padding: 10px 14px;
  border-radius: 12px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 500;
  line-height: 1.5;
}

.hht-msg.bot .hht-msg-bubble {
  background: linear-gradient(135deg, #0f0c06, #171208);
  border: 1px solid rgba(255,140,0,0.15);
  color: var(--text);
  border-bottom-left-radius: 4px;
}

.hht-msg.user .hht-msg-bubble {
  background: linear-gradient(135deg, rgba(255,140,0,0.12), rgba(255,140,0,0.06));
  border: 1px solid rgba(255,140,0,0.25);
  color: #f0e8d8;
  border-bottom-right-radius: 4px;
}

.hht-quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.hht-quick-btn {
  background: transparent;
  border: 1px solid rgba(255,140,0,0.35);
  color: var(--orange);
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
}

.hht-quick-btn:hover {
  background: rgba(255,140,0,0.1);
  box-shadow: 0 0 10px rgba(255,140,0,0.25);
}

.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 12px 14px;
  background: linear-gradient(135deg, #0f0c06, #171208);
  border: 1px solid rgba(255,140,0,0.15);
  border-radius: 12px;
  border-bottom-left-radius: 4px;
  width: fit-content;
}

.typing-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--orange);
  animation: typing 1.4s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 100% { opacity: 0.2; transform: translateY(0); }
  50% { opacity: 1; transform: translateY(-4px); }
}

#hht-input-area {
  border-top: 1px solid rgba(255,140,0,0.15);
  padding: 12px 14px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: linear-gradient(135deg, #060400, #0d0900);
  position: relative;
  z-index: 2;
}

#hht-input {
  flex: 1;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,140,0,0.2);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 500;
  resize: none;
  max-height: 80px;
  outline: none;
  transition: border-color 0.2s;
  line-height: 1.4;
}

#hht-input::placeholder { color: rgba(200,216,240,0.25); }
#hht-input:focus { border-color: rgba(255,140,0,0.5); }

#hht-send-btn {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: linear-gradient(135deg, rgba(255,140,0,0.2), rgba(255,140,0,0.08));
  border: 1px solid var(--orange);
  color: var(--orange);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

#hht-send-btn:hover {
  background: rgba(255,140,0,0.25);
  box-shadow: 0 0 15px rgba(255,140,0,0.35);
}

#hht-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#hht-send-btn svg { width: 18px; height: 18px; fill: currentColor; }

.hht-footer {
  text-align: center;
  padding: 6px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px;
  color: rgba(200,216,240,0.15);
  background: #040200;
  position: relative;
  z-index: 2;
}

@media (max-width: 420px) {
  #hht-chat-window { width: calc(100vw - 20px); right: 10px; bottom: 90px; height: 460px; }
}
</style>
</head>
<body>

<button id="hht-chat-btn" onclick="toggleChat()" title="HHT Sentinel">
  <img src="hht-sentinel.jpeg" alt="HHT Sentinel">
  <div id="hht-close-icon">✕</div>
</button>

<div id="hht-chat-window">
  <div id="hht-header">
    <div class="hht-avatar">
      <img src="hht-sentinel.jpeg" alt="Sentinel">
    </div>
    <div>
      <div class="hht-header-name">HHT SENTINEL</div>
      <div class="hht-header-sub">HappyHouseToken Assistant</div>
      <div class="hht-header-status">
        <span class="status-dot"></span>
        Online · Ready
      </div>
    </div>
  </div>

  <div id="hht-messages"></div>

  <div id="hht-input-area">
    <textarea id="hht-input" placeholder="Ask about HHT..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="hht-send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="hht-footer">happyhousetoken.com · $HHT on Solana</div>
</div>

<script>
// API calls handled securely via Netlify function

const SYSTEM_PROMPT = `You are HHT Sentinel — the official AI assistant for HappyHouseToken ($HHT).

STRICT RULES:
- Answer ONLY questions about HappyHouseToken, HHT Arena, the $HHT community, or how to buy/use $HHT
- If asked about ANYTHING unrelated (other coins, general crypto, coding, news, sports, etc.), reply with exactly: "I only answer questions about HappyHouseToken 🛡️ What do you want to know about $HHT?"
- Keep answers SHORT — max 2 sentences. No long explanations
- Friendly, slightly degen tone — meme coin community vibes
- Max 1-2 emojis per message
- Never give financial advice or price predictions
- If unsure, direct to Telegram: t.me/HappyHouseToken

HHT KNOWLEDGE:
- Token: $HHT on Solana | Mint: 4KrNyA5FpFGQj4jQZh1yKzBkobq7mGVftWYVWjfwpump
- Fair launch on pump.fun | 1 billion supply | 0% team tokens
- Website: happyhousetoken.com | Telegram: t.me/HappyHouseToken
- Buy on Jupiter: jup.ag/swap (use mint address above)
- Wallets: Phantom, Solflare, Backpack, Trust Wallet

HHT ARENA (gaming platform):
- Games: Tetris, 2048, Token Eater (Pac-Man), Puzzle, Chess
- VIP Arena: requires 1,000,000 $HHT minimum
- Online leaderboards

Respond in the same language the user writes in (Slovak or English).`;

let isOpen = false;
let isLoading = false;
let conversationHistory = [];

const QUICK_REPLIES = ["What is $HHT? 🏠", "How to buy? 💰", "Arena games 🎮", "VIP access 👑", "Telegram 📢"];

function toggleChat() {
  isOpen = !isOpen;
  document.getElementById('hht-chat-window').classList.toggle('visible', isOpen);
  document.getElementById('hht-chat-btn').classList.toggle('open', isOpen);
  if (isOpen && conversationHistory.length === 0) showWelcome();
  if (isOpen) setTimeout(() => document.getElementById('hht-input').focus(), 300);
}

function showWelcome() {
  addBotMessage("gm! I'm HHT Sentinel 🛡️ Ask me anything about HappyHouseToken!", QUICK_REPLIES);
}

function addBotMessage(text, quickReplies = []) {
  const msgs = document.getElementById('hht-messages');
  const div = document.createElement('div');
  div.className = 'hht-msg bot';
  let html = `<div class="hht-msg-bubble">${escapeHtml(text)}</div>`;
  if (quickReplies.length > 0) {
    html += `<div class="hht-quick-replies">${quickReplies.map(q =>
      `<button class="hht-quick-btn" onclick="quickReply('${q}')">${q}</button>`).join('')}</div>`;
  }
  div.innerHTML = html;
  msgs.appendChild(div);
  scrollBottom();
}

function addUserMessage(text) {
  const msgs = document.getElementById('hht-messages');
  const div = document.createElement('div');
  div.className = 'hht-msg user';
  div.innerHTML = `<div class="hht-msg-bubble">${escapeHtml(text)}</div>`;
  msgs.appendChild(div);
  scrollBottom();
}

function showTyping() {
  const msgs = document.getElementById('hht-messages');
  const div = document.createElement('div');
  div.className = 'hht-msg bot';
  div.id = 'hht-typing';
  div.innerHTML = `<div class="typing-indicator">
    <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
  </div>`;
  msgs.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('hht-typing');
  if (t) t.remove();
}

function scrollBottom() {
  const m = document.getElementById('hht-messages');
  m.scrollTop = m.scrollHeight;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function quickReply(text) {
  document.getElementById('hht-input').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('hht-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addUserMessage(text);
  conversationHistory.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('hht-send-btn').disabled = true;
  showTyping();

  try {
    const res = await fetch('/.netlify/functions/ai-analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        type: 'sentinel',
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await res.json();
    const reply = data.reply || "Something went wrong ser 🔧 Try again!";
    conversationHistory.push({ role: 'assistant', content: reply });
    removeTyping();
    addBotMessage(reply);
  } catch (err) {
    removeTyping();
    addBotMessage("Connection issue 🔧 Try again!");
  }

  isLoading = false;
  document.getElementById('hht-send-btn').disabled = false;
  input.focus();
}
</script>
</body>
</html>
