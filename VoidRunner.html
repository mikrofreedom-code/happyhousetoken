<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VOID RUNNER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    canvas { display: block; touch-action: none; }

    /* ── REGISTRATION OVERLAY ── */
    .vr-overlay {
      position:fixed; inset:0; z-index:200;
      background:rgba(0,0,0,0.92); backdrop-filter:blur(6px);
      display:flex; align-items:center; justify-content:center; padding:20px;
      font-family: monospace;
    }
    .vr-overlay.hidden { display:none; }
    .vr-modal {
      background:#050510; border:2px solid #00ffc8;
      border-radius:12px; padding:28px 24px;
      width:100%; max-width:400px;
      box-shadow:0 0 50px rgba(0,255,200,0.2);
    }
    .vr-modal h2 {
      font-size:13px; color:#00ffc8;
      text-shadow:0 0 14px rgba(0,255,200,0.6);
      margin-bottom:8px; line-height:1.7; letter-spacing:2px; text-transform:uppercase;
    }
    .vr-modal p { font-size:12px; color:rgba(255,255,255,0.35); margin-bottom:20px; line-height:1.7; }
    .vr-label { display:block; font-size:8px; letter-spacing:3px; color:rgba(0,255,200,0.6); margin-bottom:6px; text-transform:uppercase; }
    .vr-input {
      width:100%; background:#000; border:1px solid rgba(0,255,200,0.25);
      border-radius:7px; padding:11px 14px; color:#fff;
      font-size:14px; font-family:monospace; outline:none;
      transition:border-color 0.15s; margin-bottom:14px;
    }
    .vr-input:focus { border-color:#00ffc8; box-shadow:0 0 14px rgba(0,255,200,0.2); }
    .vr-input::placeholder { color:rgba(255,255,255,0.15); }
    .vr-wallet-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
    .vr-wallet-btn {
      display:flex; align-items:center; gap:8px;
      background:#000; border:1.5px solid rgba(255,255,255,0.08);
      border-radius:8px; padding:10px 12px; cursor:pointer;
      color:#fff; font-family:monospace; font-size:12px;
      transition:border-color 0.15s, background 0.15s;
    }
    .vr-wallet-btn:hover { border-color:rgba(0,255,200,0.45); background:rgba(0,255,200,0.07); }
    .vr-wallet-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .vr-wallet-connected {
      display:flex; align-items:center; gap:10px;
      background:rgba(61,255,0,0.06); border:1px solid rgba(61,255,0,0.2);
      border-radius:8px; padding:10px 14px; margin-bottom:14px;
    }
    .vr-wallet-check { width:28px; height:28px; background:#3dff00; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; color:#000; flex-shrink:0; }
    .vr-wallet-change { margin-left:auto; background:none; border:1px solid rgba(255,255,255,0.1); border-radius:5px; color:rgba(255,255,255,0.4); font-size:11px; padding:4px 8px; cursor:pointer; font-family:monospace; }
    .vr-reg-btn {
      width:100%; padding:13px; border-radius:8px; border:none;
      background:linear-gradient(135deg,#00ffc8,#00c8ff);
      color:#000; font-family:monospace; font-size:13px; font-weight:bold;
      letter-spacing:2px; cursor:pointer; text-transform:uppercase;
      box-shadow:0 0 20px rgba(0,255,200,0.4); transition:box-shadow 0.15s; margin-top:4px;
    }
    .vr-reg-btn:hover { box-shadow:0 0 36px rgba(0,255,200,0.7); }
    .vr-reg-btn:disabled { background:#111; color:rgba(255,255,255,0.2); cursor:not-allowed; box-shadow:none; }
    .vr-skip-btn {
      width:100%; background:transparent; color:rgba(255,255,255,0.3);
      border:1px solid rgba(255,255,255,0.1); border-radius:8px;
      padding:11px; font-family:monospace; font-size:12px;
      cursor:pointer; margin-top:8px; transition:border-color 0.15s, color 0.15s;
    }
    .vr-skip-btn:hover { border-color:rgba(0,255,200,0.3); color:rgba(0,255,200,0.7); }
    .vr-reg-error {
      background:rgba(255,50,50,0.1); border:1px solid rgba(255,50,50,0.3);
      color:#ff8080; border-radius:7px; padding:10px 14px;
      font-size:12px; margin-top:10px; display:none; font-family:monospace;
    }
    .vr-mpb {
      display:flex; align-items:center; gap:10px;
      background:rgba(171,159,242,0.08); border:1.5px solid rgba(171,159,242,0.2);
      border-radius:8px; padding:12px; margin-bottom:12px;
    }
    .vr-mpb-open { background:#ab9ff2; color:#111; border:none; border-radius:6px; padding:7px 12px; font-size:12px; font-weight:bold; cursor:pointer; flex-shrink:0; font-family:monospace; }

    /* ── PLAYER BAR ── */
    #vr-player-bar {
      position:fixed; top:10px; left:50%; transform:translateX(-50%);
      z-index:100; display:none; align-items:center; gap:8px;
      background:rgba(0,0,0,0.7); border:1px solid rgba(0,255,200,0.25);
      border-radius:20px; padding:5px 14px 5px 10px;
      font-family:monospace; backdrop-filter:blur(4px);
    }
    #vr-player-bar.visible { display:flex; }
    .vr-pb-avatar { width:24px; height:24px; background:#00ffc8; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold; color:#000; flex-shrink:0; }
    .vr-pb-name { font-size:11px; color:#fff; letter-spacing:1px; }
    .vr-pb-lb-btn {
      background:rgba(0,255,200,0.08); border:1px solid rgba(0,255,200,0.25);
      color:#00ffc8; border-radius:10px; padding:4px 10px;
      font-family:monospace; font-size:10px; letter-spacing:1px;
      cursor:pointer; transition:all 0.15s;
    }
    .vr-pb-lb-btn:hover { background:rgba(0,255,200,0.18); }

    /* ── LB BUTTON (always visible) ── */
    #vr-lb-fixed {
      position:fixed; top:10px; right:10px; z-index:100;
      background:rgba(0,0,0,0.7); border:1px solid rgba(0,255,200,0.25);
      border-radius:20px; padding:6px 14px;
      font-family:monospace; font-size:11px; color:#00ffc8;
      cursor:pointer; letter-spacing:1px;
      transition:background 0.15s;
    }
    #vr-lb-fixed:hover { background:rgba(0,255,200,0.12); }

    /* ── LEADERBOARD MODAL ── */
    .vr-lb-overlay {
      position:fixed; inset:0; z-index:300;
      background:rgba(0,0,0,0.9); backdrop-filter:blur(6px);
      display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .vr-lb-overlay.hidden { display:none; }
    .vr-lb-modal {
      background:#050510; border:2px solid #00ffc8;
      border-radius:12px; overflow:hidden;
      width:100%; max-width:420px; max-height:85vh; overflow-y:auto;
      box-shadow:0 0 50px rgba(0,255,200,0.2);
    }
    .vr-lb-head { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid rgba(0,255,200,0.12); }
    .vr-lb-title { font-family:monospace; font-size:11px; color:#00ffc8; text-shadow:0 0 10px rgba(0,255,200,0.5); letter-spacing:2px; text-transform:uppercase; }
    .vr-lb-close { background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer; font-size:18px; padding:4px 8px; transition:color 0.15s; }
    .vr-lb-close:hover { color:#fff; }
    .vr-lb-refresh { background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer; font-size:14px; padding:4px; transition:color 0.15s; }
    .vr-lb-refresh:hover { color:#00ffc8; }
    .vr-lb-body { padding:6px 0; min-height:60px; }
    .vr-lb-loading { text-align:center; padding:20px; color:rgba(255,255,255,0.3); font-size:12px; font-family:monospace; }
    .vr-lb-row { display:flex; align-items:center; padding:9px 16px; gap:10px; border-bottom:1px solid rgba(0,255,200,0.05); transition:background 0.1s; }
    .vr-lb-row:hover { background:rgba(0,255,200,0.04); }
    .vr-lb-row.is-me { background:rgba(0,255,200,0.06); border-left:2px solid #00ffc8; }
    .vr-lb-rank { width:24px; text-align:center; font-family:monospace; font-size:10px; color:rgba(255,255,255,0.3); flex-shrink:0; }
    .vr-lb-rank.gold { color:#ffd700; text-shadow:0 0 8px #ffd700; }
    .vr-lb-rank.silver { color:#b0b8c8; }
    .vr-lb-rank.bronze { color:#cd7f32; }
    .vr-lb-avatar { width:28px; height:28px; border-radius:50%; background:#000; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:bold; color:#00ffc8; flex-shrink:0; border:1px solid rgba(0,255,200,0.2); }
    .vr-lb-player { flex:1; min-width:0; }
    .vr-lb-player-name { font-size:13px; font-weight:bold; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family:monospace; }
    .vr-lb-player-wallet { font-size:10px; color:rgba(255,255,255,0.3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family:monospace; }
    .vr-lb-score { font-family:monospace; font-size:14px; font-weight:bold; color:#00ffc8; text-shadow:0 0 8px rgba(0,255,200,0.5); flex-shrink:0; }
    .hidden { display:none !important; }
  </style>
</head>
<body>

<!-- REGISTRATION OVERLAY -->
<div class="vr-overlay" id="vrRegOverlay">
  <div class="vr-modal">
    <div style="font-size:32px;margin-bottom:12px;">🚀</div>
    <h2>Join the Leaderboard</h2>
    <p>Connect your Solana wallet and enter a name to track your score on the Void Runner leaderboard.</p>
    <div id="vrStepConnect">
      <div id="vrMobileBanner" class="vr-mpb hidden">
        <div style="font-size:24px;">👻</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13px;font-weight:bold;color:#fff;margin-bottom:3px;">Open in Phantom Browser</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.35);">Tap below to open inside the Phantom app</div>
        </div>
        <button class="vr-mpb-open" onclick="vrOpenPhantom()">Open →</button>
      </div>
      <div class="vr-wallet-grid" id="vrWalletGrid">
        <button class="vr-wallet-btn" onclick="vrConnectWallet('phantom')"><div style="width:28px;height:28px;background:#ab9ff2;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;">👻</div><div><div>Phantom</div><div style="font-size:10px;color:rgba(255,255,255,0.35);">Most popular</div></div></button>
        <button class="vr-wallet-btn" onclick="vrConnectWallet('solflare')"><div style="width:28px;height:28px;background:#fc7227;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;">🔆</div><div><div>Solflare</div><div style="font-size:10px;color:rgba(255,255,255,0.35);">solflare.com</div></div></button>
        <button class="vr-wallet-btn" onclick="vrConnectWallet('backpack')"><div style="width:28px;height:28px;background:#e33e3f;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;">🎒</div><div><div>Backpack</div><div style="font-size:10px;color:rgba(255,255,255,0.35);">backpack.app</div></div></button>
        <button class="vr-wallet-btn" onclick="vrConnectWallet('trust')"><div style="width:28px;height:28px;background:#3375bb;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;">🛡️</div><div><div>Trust Wallet</div><div style="font-size:10px;color:rgba(255,255,255,0.35);">Mobile</div></div></button>
      </div>
    </div>
    <div class="vr-wallet-connected hidden" id="vrWalletConnected">
      <div class="vr-wallet-check">✓</div>
      <div>
        <div style="font-weight:bold;font-size:13px;color:#fff;" id="vrProviderName">Wallet</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.35);" id="vrWalletDisplay">—</div>
      </div>
      <button class="vr-wallet-change" onclick="vrChangeWallet()">Change</button>
    </div>
    <div id="vrStepName" class="hidden">
      <label class="vr-label">Player Name</label>
      <input type="text" class="vr-input" id="vrRegName" placeholder="e.g. VoidPilot" maxlength="30" autocomplete="off" onkeydown="event.stopPropagation()" onkeyup="event.stopPropagation()">
    </div>
    <button class="vr-reg-btn hidden" id="vrRegSubmit" onclick="vrSubmitRegistration()">▶ Launch</button>
    <button class="vr-skip-btn" onclick="vrSkipRegistration()">Play without leaderboard</button>
    <div class="vr-reg-error" id="vrRegError"></div>
  </div>
</div>

<!-- PLAYER BAR -->
<div id="vr-player-bar">
  <div class="vr-pb-avatar" id="vrPbAvatar">?</div>
  <div class="vr-pb-name" id="vrPbName">—</div>
  <button class="vr-pb-lb-btn" onclick="vrToggleLb()">🏆 LB</button>
</div>

<!-- LB FIXED BUTTON (always visible) -->
<button id="vr-lb-fixed" onclick="vrToggleLb()">🏆 LEADERBOARD</button>

<!-- LEADERBOARD MODAL -->
<div class="vr-lb-overlay hidden" id="vrLbOverlay" onclick="vrCloseLbBackdrop(event)">
  <div class="vr-lb-modal">
    <div class="vr-lb-head">
      <div class="vr-lb-title">🏆 Top 10 — Void Runner</div>
      <div style="display:flex;gap:6px;align-items:center;">
        <button class="vr-lb-refresh" onclick="vrLoadLb()" title="Refresh">↻</button>
        <button class="vr-lb-close" onclick="vrToggleLb()">✕</button>
      </div>
    </div>
    <div class="vr-lb-body" id="vrLbBody"><div class="vr-lb-loading">Loading...</div></div>
  </div>
</div>

<canvas id="c"></canvas>
<script>

// ─────────────────────────────────────────────
//  SETUP
// ─────────────────────────────────────────────

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const SIZE = Math.min(window.innerWidth, window.innerHeight * 0.65, 420);
canvas.width  = SIZE;
canvas.height = SIZE * 1.6;
const W = canvas.width;
const H = canvas.height;

// Game modes
const MODE_MENU    = 0;
const MODE_PLAYING = 1;
const MODE_DEAD    = 2;

// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────

const GRAVITY      = 0.24;
const JUMP_FORCE   = -6.2;
const SPEED_START  = 1.2;
const SPEED_MAX    = 3.2;
const SPEED_RAMP   = 0.0004;   // per tick
const PIPE_WIDTH   = 40;
const PIPE_GAP     = H * 0.52;
const GRACE_TICKS  = 120;      // ~2s before collisions activate
const DEAD_DELAY   = 2500;     // ms before returning to menu

const NEBULAE = [
  { x: W * 0.15, y: H * 0.25, r: W * 0.55, col: [0,   100, 255], op: 0.07 },
  { x: W * 0.85, y: H * 0.65, r: W * 0.45, col: [120,   0, 220], op: 0.06 },
  { x: W * 0.50, y: H * 0.10, r: W * 0.35, col: [0,   200, 150], op: 0.05 },
];

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────

let mode      = MODE_MENU;
let tick      = 0;
let best      = parseInt(localStorage.getItem('vr') || '0');
let btnRect   = null; // LAUNCH button hit area

// Game objects
let ship, pipes, particles, score, speed, pipeTimer, shake;

// Star layers (3 parallax speeds)
const stars = [
  Array.from({ length: 60 }, () => makeStar(0.2, 0.8,  0.2, 0.5)),
  Array.from({ length: 40 }, () => makeStar(0.5, 1.2,  0.4, 0.6)),
  Array.from({ length: 20 }, () => makeStar(1.0, 1.8,  0.7, 1.0)),
];

function makeStar(spd, maxR, minOp, maxOp) {
  return {
    x:   Math.random() * W,
    y:   Math.random() * H,
    r:   Math.random() * maxR + 0.2,
    spd: spd,
    op:  Math.random() * (maxOp - minOp) + minOp,
  };
}

// ─────────────────────────────────────────────
//  INIT / RESET
// ─────────────────────────────────────────────

function reset() {
  ship      = { x: W * 0.25, y: H * 0.35, vy: 0, trail: [] };
  pipes     = [];
  particles = [];
  score     = 0;
  speed     = SPEED_START;
  pipeTimer = -80; // delay before first pipe
  shake     = 0;
  tick      = 0;
}

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────

canvas.addEventListener('pointerdown', function(e) {
  e.preventDefault();

  // Convert screen coords to canvas coords
  const rect   = canvas.getBoundingClientRect();
  const tapX   = (e.clientX - rect.left) * (W / rect.width);
  const tapY   = (e.clientY - rect.top)  * (H / rect.height);

  if (mode === MODE_MENU) {
    // Only start if tap is inside the LAUNCH button
    if (btnRect && tapX >= btnRect.x && tapX <= btnRect.x + btnRect.w
                && tapY >= btnRect.y && tapY <= btnRect.y + btnRect.h) {
      startGame();
    }
  } else if (mode === MODE_PLAYING) {
    jump();
  }
}, { passive: false });

window.addEventListener('keydown', function(e) {
  if (e.code !== 'Space') return;
  e.preventDefault();
  if (mode === MODE_MENU)    startGame();
  else if (mode === MODE_PLAYING) jump();
});

function startGame() {
  reset();
  mode = MODE_PLAYING;
}

function jump() {
  ship.vy = JUMP_FORCE;
  spawnThrustBurst();
}

// ─────────────────────────────────────────────
//  PARTICLES
// ─────────────────────────────────────────────

function spawnThrustBurst() {
  for (let i = 0; i < 12; i++) {
    const angle = Math.PI + (Math.random() - 0.5) * 1.0;
    const spd   = Math.random() * 3 + 1;
    particles.push({
      x: ship.x - 14, y: ship.y + (Math.random() - 0.5) * 6,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: 1, decay: 0.06 + Math.random() * 0.04,
      size: Math.random() * 4 + 2, type: 'thrust',
    });
  }
}

function spawnExhaust() {
  particles.push({
    x: ship.x - 14, y: ship.y + (Math.random() - 0.5) * 4,
    vx: -(Math.random() * 1.5 + 0.5), vy: (Math.random() - 0.5) * 0.8,
    life: 0.7, decay: 0.05 + Math.random() * 0.03,
    size: Math.random() * 3 + 1, type: 'exhaust',
  });
}

function spawnExplosion(x, y) {
  for (let i = 0; i < 32; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = Math.random() * 5 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: 1, decay: 0.025 + Math.random() * 0.02,
      size: Math.random() * 5 + 2, type: 'explode',
    });
  }
}

function spawnScorePop(x, y) {
  for (let i = 0; i < 8; i++) {
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * 2, vy: Math.sin(angle) * 3,
      life: 1, decay: 0.03, size: 3, type: 'score',
    });
  }
}

// ─────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────

function update() {
  tick++;

  // Ship physics
  ship.vy += GRAVITY;
  ship.y  += ship.vy;

  // Trail
  ship.trail.push({ x: ship.x, y: ship.y });
  if (ship.trail.length > 18) ship.trail.shift();

  // Idle exhaust every 2 ticks
  if (tick % 2 === 0) spawnExhaust();

  // Speed ramp
  speed = Math.min(SPEED_MAX, SPEED_START + tick * SPEED_RAMP);

  // Pipes
  pipeTimer++;
  const pipeInterval = Math.max(90, 140 - score * 2);
  if (pipeTimer >= pipeInterval) { spawnPipe(); pipeTimer = 0; }

  for (const p of pipes) p.x -= speed;
  pipes = pipes.filter(p => p.x > -60);

  // Score — count when pipe passes ship
  for (const p of pipes) {
    if (!p.passed && p.x + PIPE_WIDTH < ship.x) {
      p.passed = true;
      score++;
      spawnScorePop(ship.x, ship.y - 20);
    }
  }

  // Parallax stars
  for (const layer of stars) {
    for (const s of layer) {
      s.x -= s.spd * (speed / 3);
      if (s.x < 0) { s.x = W + 1; s.y = Math.random() * H; }
    }
  }

  // Particles
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.type === 'explode') p.vy += 0.15;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0).slice(-200);

  // Screen shake countdown
  if (shake > 0) shake--;

  // Collision (grace period for first GRACE_TICKS ticks)
  if (tick < GRACE_TICKS) return;

  const sr = 11;
  if (ship.y - sr < 0 || ship.y + sr > H) { die(); return; }
  for (const p of pipes) {
    if (ship.x + sr > p.x && ship.x - sr < p.x + PIPE_WIDTH) {
      if (ship.y - sr < p.top || ship.y + sr > p.top + p.gap) { die(); return; }
    }
  }
}

function spawnPipe() {
  const top = H * 0.08 + Math.random() * (H * 0.38);
  const col = Math.random() > 0.5 ? [0, 255, 200] : [0, 180, 255];
  pipes.push({ x: W + PIPE_WIDTH, top, gap: PIPE_GAP, passed: false, col });
}

function die() {
  if (score > best) { best = score; localStorage.setItem('vr', best); }
  spawnExplosion(ship.x, ship.y);
  shake = 18;
  mode  = MODE_DEAD;
  if (score > 0) vrSubmitScore(score);
  setTimeout(() => { mode = MODE_MENU; }, DEAD_DELAY);
}

// ─────────────────────────────────────────────
//  DRAW HELPERS
// ─────────────────────────────────────────────

function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x,     y,     x + r,   y,         r);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

function drawCornerBrackets(margin, size, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth   = 2;
  const m = margin;
  [
    [m,     m,     1,  1],
    [W - m, m,    -1,  1],
    [m,     H - m, 1, -1],
    [W - m, H - m,-1, -1],
  ].forEach(([cx, cy, sx, sy]) => {
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + sx * size, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy + sy * size); ctx.stroke();
  });
}

// ─────────────────────────────────────────────
//  DRAW FUNCTIONS
// ─────────────────────────────────────────────

function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   '#000a1a');
  grad.addColorStop(0.5, '#000510');
  grad.addColorStop(1,   '#000c18');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Nebulae
  for (const n of NEBULAE) {
    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
    g.addColorStop(0, `rgba(${n.col},${n.op})`);
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Stars
  for (let li = 0; li < stars.length; li++) {
    for (const s of stars[li]) {
      const twinkle = 0.6 + 0.4 * Math.sin(tick * 0.05 + s.x);
      ctx.globalAlpha = s.op * twinkle;
      ctx.fillStyle   = li === 2 ? '#aaddff' : '#ffffff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // Scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  for (let y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 2);
}

function drawPipes() {
  for (const p of pipes) {
    const [r, g, b] = p.col;
    const bot = p.top + p.gap;

    // Fill with subtle gradient
    const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_WIDTH, 0);
    grad.addColorStop(0,   'rgba(0,30,25,0.98)');
    grad.addColorStop(0.4, `rgba(${r},${g},${b},0.25)`);
    grad.addColorStop(1,   'rgba(0,20,18,0.98)');
    ctx.fillStyle = grad;
    ctx.fillRect(p.x, 0,   PIPE_WIDTH, p.top);
    ctx.fillRect(p.x, bot, PIPE_WIDTH, H - bot);

    // Neon border
    ctx.shadowBlur  = 12;
    ctx.shadowColor = `rgb(${r},${g},${b})`;
    ctx.strokeStyle = `rgb(${r},${g},${b})`;
    ctx.lineWidth   = 1.5;
    ctx.strokeRect(p.x + 0.75, 0,       PIPE_WIDTH - 1.5, p.top);
    ctx.strokeRect(p.x + 0.75, bot + 1, PIPE_WIDTH - 1.5, H - bot);

    // Gap edge glow lines
    ctx.shadowBlur  = 20;
    ctx.shadowColor = `rgba(${r},${g},${b},0.6)`;
    ctx.strokeStyle = `rgba(${r},${g},${b},0.5)`;
    ctx.lineWidth   = 1;
    ctx.beginPath(); ctx.moveTo(p.x, p.top); ctx.lineTo(p.x + PIPE_WIDTH, p.top); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x, bot);   ctx.lineTo(p.x + PIPE_WIDTH, bot);   ctx.stroke();
    ctx.shadowBlur  = 0;

    // Inner detail lines
    ctx.strokeStyle = `rgba(${r},${g},${b},0.1)`;
    ctx.lineWidth   = 1;
    for (let yy = 6; yy < p.top - 4; yy += 10) {
      ctx.beginPath(); ctx.moveTo(p.x + 4, yy); ctx.lineTo(p.x + 36, yy); ctx.stroke();
    }
    for (let yy = bot + 6; yy < H - 4; yy += 10) {
      ctx.beginPath(); ctx.moveTo(p.x + 4, yy); ctx.lineTo(p.x + 36, yy); ctx.stroke();
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);

    if (p.type === 'thrust' || p.type === 'exhaust') {
      ctx.fillStyle   = p.life > 0.5 ? `rgba(0,200,255,${p.life})` : `rgba(255,140,0,${p.life})`;
      ctx.shadowBlur  = 8;
      ctx.shadowColor = '#00c8ff';
    } else if (p.type === 'explode') {
      ctx.fillStyle   = p.life > 0.5 ? '#ff6030' : '#ffcc00';
      ctx.shadowBlur  = 12;
      ctx.shadowColor = '#ff4000';
    } else if (p.type === 'score') {
      ctx.fillStyle   = '#00ffc8';
      ctx.shadowBlur  = 8;
      ctx.shadowColor = '#00ffc8';
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

function drawShip() {
  // Glow trail
  for (let i = 0; i < ship.trail.length; i++) {
    const t = ship.trail[i];
    ctx.globalAlpha = (i / ship.trail.length) * 0.3;
    ctx.fillStyle   = '#00ffc8';
    ctx.beginPath();
    ctx.arc(t.x, t.y, 3 * (i / ship.trail.length), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Ship
  ctx.save();
  ctx.translate(ship.x, ship.y);
  ctx.rotate(Math.atan2(ship.vy, 20) * 0.45);

  ctx.shadowBlur  = 24;
  ctx.shadowColor = '#00ffc8';
  ctx.fillStyle   = '#00ffc8';
  ctx.beginPath();
  ctx.moveTo(18, 0); ctx.lineTo(-12, -11); ctx.lineTo(-8, 0); ctx.lineTo(-12, 11);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.fillStyle  = 'rgba(0,180,255,0.7)';
  ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(-12, -11); ctx.lineTo(-17, -5); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(-12,  11); ctx.lineTo(-17,  5); ctx.closePath(); ctx.fill();

  ctx.fillStyle   = '#fff';
  ctx.shadowBlur  = 8;
  ctx.shadowColor = '#fff';
  ctx.beginPath(); ctx.arc(5, 0, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur  = 0;

  ctx.restore();
}

function drawScore() {
  ctx.shadowBlur  = 16;
  ctx.shadowColor = '#00ffc8';
  ctx.fillStyle   = '#00ffc8';
  ctx.font        = 'bold ' + Math.round(W * 0.08) + 'px monospace';
  ctx.textAlign   = 'center';
  ctx.fillText(score, W / 2, Math.round(H * 0.07));
  ctx.shadowBlur  = 0;
  ctx.textAlign   = 'left';
}

function drawMenu() {
  ctx.textAlign = 'center';

  // Animated ship preview
  const bobY  = H * 0.42 + Math.sin(tick * 0.05) * 8;
  ctx.save();
  ctx.translate(W / 2, bobY);
  ctx.shadowBlur  = 28;
  ctx.shadowColor = '#00ffc8';
  ctx.fillStyle   = '#00ffc8';
  ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(-14,-13); ctx.lineTo(-9,0); ctx.lineTo(-14,13); ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(0,180,255,0.7)';
  ctx.beginPath(); ctx.moveTo(-9,0); ctx.lineTo(-14,-13); ctx.lineTo(-20,-6); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-9,0); ctx.lineTo(-14, 13); ctx.lineTo(-20,  6); ctx.closePath(); ctx.fill();
  ctx.fillStyle   = '#fff';
  ctx.shadowBlur  = 8;
  ctx.shadowColor = '#fff';
  ctx.beginPath(); ctx.arc(6, 0, 4, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur  = 0;
  ctx.restore();

  // Title with pulse glow
  const fs    = Math.round(W * 0.13);
  const pulse = 0.85 + 0.15 * Math.sin(tick * 0.04);
  ctx.shadowBlur  = 28 * pulse;
  ctx.shadowColor = '#00ffc8';
  ctx.fillStyle   = '#fff';
  ctx.font        = 'bold ' + fs + 'px monospace';
  ctx.fillText('VOID',   W / 2, H * 0.2);
  ctx.fillText('RUNNER', W / 2, H * 0.2 + fs * 1.15);
  ctx.shadowBlur  = 0;

  ctx.fillStyle = 'rgba(0,255,200,0.35)';
  ctx.font      = Math.round(W * 0.032) + 'px monospace';
  ctx.fillText('ESCAPE THE INFINITE VOID', W / 2, H * 0.2 + fs * 2.1);

  // LAUNCH button
  const bw = W * 0.55, bh = H * 0.075;
  const bx = W / 2 - bw / 2, by = H * 0.63;
  const bg = ctx.createLinearGradient(bx, by, bx + bw, by + bh);
  bg.addColorStop(0, '#00ffc8');
  bg.addColorStop(1, '#00c8ff');
  ctx.fillStyle   = bg;
  ctx.shadowBlur  = 20;
  ctx.shadowColor = '#00ffc8';
  ctx.strokeStyle = 'transparent';
  ctx.lineWidth   = 0;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, bh / 2); ctx.fill();
  ctx.shadowBlur  = 0;
  ctx.fillStyle   = '#000';
  ctx.font        = 'bold ' + Math.round(W * 0.05) + 'px monospace';
  ctx.fillText('▶  LAUNCH', W / 2, by + bh * 0.67);
  btnRect = { x: bx, y: by, w: bw, h: bh };

  // Best score
  if (best > 0) {
    ctx.fillStyle = 'rgba(0,255,200,0.5)';
    ctx.font      = Math.round(W * 0.038) + 'px monospace';
    ctx.fillText('BEST: ' + best, W / 2, H * 0.76);
  }

  drawCornerBrackets(14, 20, 'rgba(0,255,200,0.3)');
  ctx.textAlign = 'left';
}

function drawDead() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  // Glitch effect on title
  const glitch    = Math.random() < 0.08 ? (Math.random() - 0.5) * 6 : 0;
  const titleSize = Math.round(W * 0.11);
  ctx.shadowBlur  = 24;
  ctx.shadowColor = '#ff3060';
  ctx.fillStyle   = '#ff3060';
  ctx.font        = 'bold ' + titleSize + 'px monospace';
  ctx.fillText('SYSTEM',  W / 2 + glitch, H * 0.33);
  ctx.fillText('FAILURE', W / 2 - glitch, H * 0.33 + titleSize * 1.1);
  ctx.shadowBlur  = 0;

  // Score panel
  const px = W * 0.1, py = H * 0.49, pw = W * 0.8, ph = H * 0.22;
  ctx.fillStyle   = 'rgba(0,255,200,0.04)';
  ctx.strokeStyle = 'rgba(0,255,200,0.2)';
  ctx.lineWidth   = 1;
  drawRoundRect(px, py, pw, ph, 8);

  ctx.fillStyle   = 'rgba(0,255,200,0.4)';
  ctx.font        = Math.round(W * 0.032) + 'px monospace';
  ctx.fillText('SCORE', W / 2, py + ph * 0.28);

  ctx.shadowBlur  = 14;
  ctx.shadowColor = '#00ffc8';
  ctx.fillStyle   = '#00ffc8';
  ctx.font        = 'bold ' + Math.round(W * 0.1) + 'px monospace';
  ctx.fillText(score, W / 2, py + ph * 0.62);
  ctx.shadowBlur  = 0;

  ctx.fillStyle = 'rgba(0,255,200,0.35)';
  ctx.font      = Math.round(W * 0.032) + 'px monospace';
  ctx.fillText('BEST: ' + best, W / 2, py + ph * 0.9);

  ctx.textAlign = 'left';
}

// ─────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────

function frame() {
  requestAnimationFrame(frame);

  // Screen shake
  const shaking = shake > 0;
  if (shaking) {
    ctx.save();
    ctx.translate((Math.random() - 0.5) * 8, (Math.random() - 0.5) * 8);
    shake--;
  }

  drawBackground();

  if (mode === MODE_MENU) {
    // Slow idle star scroll
    for (const layer of stars)
      for (const s of layer) { s.x -= s.spd * 0.27; if (s.x < 0) { s.x = W + 1; s.y = Math.random() * H; } }
    drawMenu();

  } else if (mode === MODE_PLAYING) {
    update();
    drawPipes();
    drawParticles();
    drawShip();
    drawScore();

  } else { // MODE_DEAD
    // Slow star drift while dead
    for (const s of stars[0]) { s.x -= s.spd * 0.3; if (s.x < 0) { s.x = W + 1; s.y = Math.random() * H; } }
    drawPipes();
    drawParticles();
    drawShip();
    drawScore();
    drawDead();
  }

  if (shaking) ctx.restore();
}

frame();

const VR_URL = 'https://sndnglmrpgdzwdilgapj.supabase.co';
const VR_KEY = 'sb_publishable_WWwRrWf9BDpCAgcFVaQ5ow_fE3IDZU3';
const VR_TABLE = 'hht_voidrunner_leaderboard';

let vrPlayer = null;
let vrLbVisible = false;
let vrConnectedWallet = null;

function vrSbFetch(method, path, body) {
  return fetch(VR_URL + '/rest/v1/' + path, {
    method, headers: {
      'apikey': VR_KEY, 'Authorization': 'Bearer ' + VR_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  }).then(r => r.json());
}

const VR_WALLETS = {
  phantom:  { name:'Phantom',     getProvider: ()=>(window.phantom?.solana)||(window.solana?.isPhantom?window.solana:null), installUrl:'https://phantom.app' },
  solflare: { name:'Solflare',    getProvider: ()=>(window.solflare?.isSolflare?window.solflare:null), installUrl:'https://solflare.com' },
  backpack: { name:'Backpack',    getProvider: ()=>(window.backpack?.isBackpack?window.backpack:(window.xnft?.solana||null)), installUrl:'https://backpack.app' },
  trust:    { name:'Trust Wallet',getProvider: ()=>(window.trustwallet?.solana)||(window.solana?.isTrust?window.solana:null), installUrl:'https://trustwallet.com' }
};

function vrShortenWallet(w) { return w && w.length>10 ? w.slice(0,4)+'...'+w.slice(-4) : w; }
function vrEsc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function vrShowError(msg) { const el=document.getElementById('vrRegError'); el.textContent=msg; el.style.display='block'; }
function vrHideError() { document.getElementById('vrRegError').style.display='none'; }
function vrIsMobile() { return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); }
function vrInPhantom() { return !!(window.phantom?.solana)||!!(window.solana?.isPhantom); }

function vrOpenPhantom() {
  const cur = window.location.href;
  const isLocal = cur.startsWith('file://') || !window.location.origin || window.location.origin==='null';
  const ref = isLocal ? 'https://happyhousetoken.com' : window.location.origin;
  const target = isLocal ? 'https://happyhousetoken.com/VoidRunner.html' : cur;
  window.location.href = 'https://phantom.app/ul/browse/'+encodeURIComponent(target)+'?ref='+encodeURIComponent(ref);
}

function vrInitMobileCheck() {
  if (!vrIsMobile()) return;
  if (vrInPhantom()) { document.getElementById('vrMobileBanner').classList.add('hidden'); return; }
  document.getElementById('vrMobileBanner').classList.remove('hidden');
  document.getElementById('vrWalletGrid').classList.add('hidden');
}

async function vrConnectWallet(key) {
  vrHideError();
  const def = VR_WALLETS[key]; if (!def) return;
  const provider = def.getProvider();
  if (!provider) {
    if (vrIsMobile()) { document.getElementById('vrMobileBanner').classList.remove('hidden'); document.getElementById('vrWalletGrid').classList.add('hidden'); }
    else vrShowError(def.name + ' not found. Install from ' + def.installUrl);
    return;
  }
  document.querySelectorAll('.vr-wallet-btn').forEach(b=>b.disabled=true);
  try {
    const resp = await provider.connect();
    vrConnectedWallet = resp.publicKey.toString();
    document.getElementById('vrStepConnect').classList.add('hidden');
    document.getElementById('vrWalletConnected').classList.remove('hidden');
    document.getElementById('vrProviderName').textContent = def.name + ' Connected';
    document.getElementById('vrWalletDisplay').textContent = vrShortenWallet(vrConnectedWallet);
    document.getElementById('vrStepName').classList.remove('hidden');
    document.getElementById('vrRegSubmit').classList.remove('hidden');
    setTimeout(()=>document.getElementById('vrRegName').focus(), 100);
  } catch(e) {
    vrShowError('Connection cancelled or failed.');
    document.querySelectorAll('.vr-wallet-btn').forEach(b=>b.disabled=false);
  }
}

function vrChangeWallet() {
  vrConnectedWallet = null;
  document.getElementById('vrWalletConnected').classList.add('hidden');
  document.getElementById('vrStepConnect').classList.remove('hidden');
  document.getElementById('vrStepName').classList.add('hidden');
  document.getElementById('vrRegSubmit').classList.add('hidden');
  document.querySelectorAll('.vr-wallet-btn').forEach(b=>b.disabled=false);
  vrHideError(); vrInitMobileCheck();
}

async function vrSubmitRegistration() {
  vrHideError();
  const name = document.getElementById('vrRegName').value.trim();
  const wallet = vrConnectedWallet;
  if (!wallet) { vrShowError('Please connect your wallet first.'); return; }
  if (!name) { vrShowError('Please enter your player name.'); return; }
  if (name.length < 2) { vrShowError('Name must be at least 2 characters.'); return; }
  const btn = document.getElementById('vrRegSubmit');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    vrPlayer = { name, wallet };
    localStorage.setItem('hhtVoidRunnerPlayer', JSON.stringify(vrPlayer));
    vrCloseOverlay();
    vrShowPlayerBar(vrPlayer);
  } catch(e) {
    vrShowError('Something went wrong. Try again.');
    btn.disabled = false; btn.textContent = '▶ Launch';
  }
}

function vrSkipRegistration() { vrCloseOverlay(); }
function vrCloseOverlay() { document.getElementById('vrRegOverlay').classList.add('hidden'); }

function vrShowPlayerBar(p) {
  const bar = document.getElementById('vr-player-bar');
  bar.classList.add('visible');
  document.getElementById('vrPbAvatar').textContent = p.name.charAt(0).toUpperCase();
  document.getElementById('vrPbName').textContent = p.name;
  document.getElementById('vr-lb-fixed').style.display = 'none';
}

function vrToggleLb() {
  const ov = document.getElementById('vrLbOverlay');
  vrLbVisible = !vrLbVisible;
  if (vrLbVisible) { ov.classList.remove('hidden'); vrLoadLb(); }
  else ov.classList.add('hidden');
}

function vrCloseLbBackdrop(e) { if (e.target.id==='vrLbOverlay') vrToggleLb(); }

async function vrLoadLb() {
  const body = document.getElementById('vrLbBody');
  body.innerHTML = '<div class="vr-lb-loading">Loading...</div>';
  try {
    const rows = await vrSbFetch('GET', VR_TABLE+'?select=wallet,nickname,score&order=score.desc&limit=10');
    if (!Array.isArray(rows) || rows.length===0) { body.innerHTML='<div class="vr-lb-loading">No scores yet — be the first! 🚀</div>'; return; }
    const rankLabels=['🥇','🥈','🥉'], rankClasses=['gold','silver','bronze'];
    body.innerHTML = rows.map((row,i)=>{
      const isMe = vrPlayer && row.wallet===vrPlayer.wallet;
      const rowCls = 'vr-lb-row'+(isMe?' is-me':'');
      const rankLbl = i<3?rankLabels[i]:(i+1);
      const rankCls = i<3?rankClasses[i]:'';
      return `<div class="${rowCls}">
        <div class="vr-lb-rank ${rankCls}">${rankLbl}</div>
        <div class="vr-lb-avatar">${(row.nickname||'?').charAt(0).toUpperCase()}</div>
        <div class="vr-lb-player">
          <div class="vr-lb-player-name">${vrEsc(row.nickname)}${isMe?' 👈':''}</div>
          <div class="vr-lb-player-wallet">${vrShortenWallet(row.wallet)}</div>
        </div>
        <div class="vr-lb-score">${row.score}</div>
      </div>`;
    }).join('');
  } catch(e) { body.innerHTML='<div class="vr-lb-loading">Could not load leaderboard.</div>'; }
}

async function vrSubmitScore(finalScore) {
  if (!vrPlayer || finalScore <= 0) return;
  try {
    await vrSbFetch('POST', VR_TABLE, {
      wallet: vrPlayer.wallet,
      nickname: vrPlayer.name,
      score: finalScore
    });
    if (vrLbVisible) vrLoadLb();
  } catch(e) { /* silent */ }
}

// Init
(function vrInit() {
  const saved = localStorage.getItem('hhtVoidRunnerPlayer');
  if (saved) {
    try { vrPlayer = JSON.parse(saved); vrCloseOverlay(); vrShowPlayerBar(vrPlayer); }
    catch(e) {}
  }
  vrInitMobileCheck();
})();
